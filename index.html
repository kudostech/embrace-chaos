<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Embrace Chaos</title>
</head>
<body>
<h1>Embrace Chaos</h1>
<p>Every day starts with thousands of decisions. Don't know what to do next? <br>
Suffering from 'Decision Fatigue'? Let us do the thinking for you! <br>
Press the button and we will surrender your fate to the digital gods of chaos. 
</p>

<form action="#" method="post" name="calculator">
	<fieldset>
		<legend>Chaotic Calculator</legend>
		<label for="name"> Number 1:</label>
		<input type="number" id="name" name="number1" required placeholder="Enter number here"/>
		<select id="cal" name="calType">
			<option value = "plus">+</option>
			<option value ="minus">-</option>
			<option value = "multiply">*</option>
			<option value ="devision">/</option>
		</select>
		<label for="name"> Number 2:</label>
		<input type="number" id="name" name="number2" required placeholder="Enter number here"/>
		
	</fieldset>

	<fieldset>
		<legend>Khaotic Calories Calculator</legend>
		<label for="name"> Number 1:</label>
		<input type="number" id="name" name="number1" required placeholder="Enter number here"/>
		<label for="name">Evil Food</label>
		<input type="text" id="name" name="number2" required placeholder="Tell me what did you tuck in?"/>
		
	</fieldset>

</form>


<button type="submit" value="submit">I'm not a button!</button>

</body>
</html>
